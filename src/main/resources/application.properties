spring.application.name=user-management

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:umdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Prompt logging (custom)
prompt.logging.file=user-prompt.log
prompt.logging.header=X-User-Prompt
mfa.otp.length=6
mfa.otp.ttl-seconds=300
mfa.gateway.url=http://localhost:9090/api/notify/sms

# LDAP connection (example values)
ldap.url=ldap://localhost:389
ldap.base-dn=dc=example,dc=com
ldap.bind-dn=cn=admin,dc=example,dc=com
ldap.bind-password=adminpassword

# LDAP search tuning
ldap.user-search-base=ou=people
ldap.username-attribute=uid
